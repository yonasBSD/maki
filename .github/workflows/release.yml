# To release:
#   git tag vX.Y.Z
#   git push origin vX.Y.Z
name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  BINARY_NAME: maki

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft --title "$GITHUB_REF_NAME" --generate-notes

  build-linux:
    name: Build (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Build in Alpine container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e CARGO_TERM_COLOR=always \
            -e CARGO_INCREMENTAL=0 \
            alpine:3.21 sh -c '
              apk add --no-cache gcc g++ musl-dev make perl linux-headers curl git ca-certificates pkgconf
              git config --global --add safe.directory /workspace
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --target ${{ matrix.target }}
              source "$HOME/.cargo/env"
              cargo build --release --target ${{ matrix.target }}
            '
          sudo chown -R $(id -u):$(id -g) target/

      - name: Package
        run: |
          tag="${{ needs.create-release.outputs.tag }}"
          archive="${BINARY_NAME}-${tag}-${{ matrix.target }}.tar.gz"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "${BINARY_NAME}"
          tar czf "${archive}" "${BINARY_NAME}"
          echo "ARCHIVE=${archive}" >> "$GITHUB_ENV"

      - name: Upload artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.create-release.outputs.tag }}" "${{ env.ARCHIVE }}" --repo "$GITHUB_REPOSITORY" --clobber

  build-other:
    name: Build (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-pc-windows-msvc
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ needs.create-release.outputs.tag }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          tag="${{ needs.create-release.outputs.tag }}"
          archive="${BINARY_NAME}-${tag}-${{ matrix.target }}.tar.gz"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "${BINARY_NAME}"
          tar czf "${archive}" "${BINARY_NAME}"
          echo "ARCHIVE=${archive}" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          tag="${{ needs.create-release.outputs.tag }}"
          archive="${BINARY_NAME}-${tag}-${{ matrix.target }}.zip"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}.exe" "${BINARY_NAME}.exe"
          7z a "${archive}" "${BINARY_NAME}.exe"
          echo "ARCHIVE=${archive}" >> "$GITHUB_ENV"

      - name: Upload artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.create-release.outputs.tag }}" "${{ env.ARCHIVE }}" --repo "$GITHUB_REPOSITORY" --clobber

  checksums:
    name: Checksums
    needs: [create-release, build-linux, build-other]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${{ needs.create-release.outputs.tag }}" --repo "$GITHUB_REPOSITORY" --dir artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > ../sha256sums.txt
          cat ../sha256sums.txt

      - name: Upload checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.create-release.outputs.tag }}" sha256sums.txt --repo "$GITHUB_REPOSITORY" --clobber

  publish-release:
    name: Publish Release
    needs: [create-release, checksums]
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as published
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ needs.create-release.outputs.tag }}" --repo "$GITHUB_REPOSITORY" --draft=false
